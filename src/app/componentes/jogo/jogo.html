<section>
    <button class="favorito-btn" (click)="alternarFavorito()">
        <span>{{ jogo().favorito ? '\u2764' : '\u2661'}}</span>
    </button>
    <div class="imagem">
        <img [src]="jogo().imagem" [alt]="jogo().nome">
    </div>
    <div class="info-jogo">
        <h2 class="texto-h2">{{jogo().nome}}</h2>
        <h3 class="texto-h3">{{jogo().desenvolvedor}}</h3>
    </div>
</section>
